<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Page</title>
    <style>
        /* Estilos generales y reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Configuración del cuerpo y centrado del formulario */
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Contenedor principal tipo ventana */
        .window-container {
            background-color: #2d2d2d;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 500px;
            overflow: hidden;
        }

        /* Barra superior con iconos */
        .header-bar {
            background-color: #1a1a1a;
            padding: 12px 16px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 8px;
        }

        .header-icon {
            width: 16px;
            height: 16px;
            fill: #888;
            cursor: pointer;
            transition: fill 0.2s;
        }

        .header-icon:hover {
            fill: #fff;
        }

        .form-container {
            padding: 30px;
        }

        /* Grupos de campos del formulario */
        .form-group {
            position: relative;
            margin-bottom: 20px;
        }

        /* Campos de entrada con animación de etiquetas */
        .form-input {
            width: 100%;
            padding: 16px 12px;
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 4px;
            color: #fff;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-bottom: 2px solid #00ffff;
        }

        .form-label {
            position: absolute;
            left: 12px;
            top: 16px;
            color: #888;
            font-size: 16px;
            pointer-events: none;
            transition: all 0.3s ease;
            background-color: #1a1a1a;
            padding: 0 4px;
        }

        .form-input:focus + .form-label,
        .form-input:not(:placeholder-shown) + .form-label {
            top: -8px;
            font-size: 12px;
            color: #00ffff;
        }

        .form-input::placeholder {
            color: transparent;
        }

        .form-input:focus::placeholder {
            color: #888;
        }

        .select-wrapper {
            position: relative;
        }

        .select-wrapper::after {
            content: '▼';
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
            pointer-events: none;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .checkbox-input {
            width: 18px;
            height: 18px;
            accent-color: #00ffff;
        }

        .checkbox-label {
            color: #fff;
            font-size: 16px;
        }

        /* Campo de carga de imágenes con drag and drop */
        .image-upload {
            width: 100%;
            height: 50px;
            border: 2px dashed #333;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #1a1a1a;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .image-upload:hover {
            border-color: #00ffff;
        }

        .image-upload.dragover {
            border-color: #00ffff;
            background-color: #0a1a1a;
        }

        .upload-icon {
            width: 24px;
            height: 24px;
            fill: #888;
        }

        .upload-text {
            color: #888;
            font-size: 14px;
            margin-left: 8px;
        }

        .file-path {
            color: #00ffff;
            font-size: 12px;
            margin-top: 4px;
        }

        /* Grupo de botones del formulario */
        .button-group {
            display: flex;
            gap: 12px;
        }

        /* Estilos de botones con efectos hover */
        .form-button {
            flex: 1;
            padding: 12px 24px;
            background-color: #1a1a1a;
            color: #fff;
            border: 1px solid #333;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .form-button:hover {
            background-color: #333;
            border-color: #00ffff;
        }

        .form-button:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>
    <div class="window-container">
        <div class="header-bar">
            <svg class="header-icon" viewBox="0 0 24 24">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
            </svg>
            <svg class="header-icon" viewBox="0 0 24 24">
                <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
            </svg>
            <svg class="header-icon" viewBox="0 0 24 24">
                <path d="M10 4H4c-1.11 0-2 .89-2 2v12c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2h-8l-2-2z"/>
            </svg>
            <svg class="header-icon" viewBox="0 0 24 24">
                <path d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0L19.2 12l-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"/>
            </svg>
        </div>
        
        <div class="form-container">
            <form>
                <div class="form-group">
                    <input type="text" class="form-input" id="name" placeholder="Name">
                    <label for="name" class="form-label">Name</label>
                </div>

                <div class="form-group">
                    <input type="email" class="form-input" id="email" placeholder="E-mail">
                    <label for="email" class="form-label">E-mail</label>
                </div>

                <div class="form-group">
                    <div class="select-wrapper">
                        <input type="text" class="form-input" id="item" placeholder="Item" readonly>
                        <label for="item" class="form-label">Item</label>
                    </div>
                </div>

                <div class="form-group">
                    <div class="image-upload" id="imageUpload">
                        <svg class="upload-icon" viewBox="0 0 24 24">
                            <path d="M14,2H6A2,2 0 0,0 4,4V20A2,2 0 0,0 6,22H18A2,2 0 0,0 20,20V8L14,2M18,20H6V4H13V9H18V20Z"/>
                        </svg>
                        <span class="upload-text">Drop image here or click to upload</span>
                        <div class="file-path" id="filePath"></div>
                    </div>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" class="checkbox-input" id="agree">
                    <label for="agree" class="checkbox-label">Do you agree?</label>
                </div>

                <div class="button-group">
                    <button type="submit" class="form-button">SUBMIT</button>
                    <button type="button" class="form-button" onclick="clearForm()">CLEAR</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Funcionalidad de carga de imágenes
        const imageUpload = document.getElementById('imageUpload');
        const filePath = document.getElementById('filePath');

        // Manejo de clic para seleccionar archivo
        imageUpload.addEventListener('click', () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    filePath.textContent = file.name;
                }
            };
            input.click();
        });

        // Efectos visuales durante drag and drop
        imageUpload.addEventListener('dragover', (e) => {
            e.preventDefault();
            imageUpload.classList.add('dragover');
        });

        imageUpload.addEventListener('dragleave', () => {
            imageUpload.classList.remove('dragover');
        });

        // Procesamiento de archivo soltado
        imageUpload.addEventListener('drop', (e) => {
            e.preventDefault();
            imageUpload.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                filePath.textContent = file.name;
            }
        });

        // Función para limpiar el formulario
        function clearForm() {
            document.querySelector('form').reset();
            filePath.textContent = '';
            // Restablecer posiciones de etiquetas
            document.querySelectorAll('.form-input').forEach(input => {
                input.blur();
            });
        }

        // Manejo del envío del formulario
        document.querySelector('form').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('¡Formulario enviado!');
        });
    </script>
</body>
</html>
